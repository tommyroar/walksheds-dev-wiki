name: Deploy Codex to GitHub Pages

# This workflow lives under dev-wiki/ in the walksheds repo for review, but it is
# inert there (GitHub only runs workflows at a repo root). It activates once the
# contents of dev-wiki/ become the root of the standalone tommyroar/walksheds-dev-wiki
# repo, which serves dev.wiki.walksheds.xyz. See deployment.md in this codex.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
